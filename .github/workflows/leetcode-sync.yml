name: Sync LeetCode

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync LeetCode
        uses: joshcai/leetcode-sync-action@v1
        with:
          github-username: ${{ secrets.GH_USERNAME }}
          leetcode-username: ${{ secrets.LEETCODE_USERNAME }}
